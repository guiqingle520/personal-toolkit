services:
  backend:
    build:
      context: ./backend
    container_name: personal-toolkit-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: personal-toolkit-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
