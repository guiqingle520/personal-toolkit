server:
  port: 8080

spring:
  application:
    name: personal-toolkit-backend
  profiles:
    default: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@//localhost:1521/FREEPDB1} # Oracle 连接串示例
    username: ${SPRING_DATASOURCE_USERNAME:personal_toolkit}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none # 建议通过 SQL/Flyway/Liquibase 管理 Oracle 表结构
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:} # 如无密码可留空
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:5s}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.data.redis: info

app:
  auth:
    jwt:
      secret: ${APP_AUTH_JWT_SECRET:uizFVR6Xqk4LzrbdSjOPDXz9r3mrI3FbTsT8z6jTexs=}
      issuer: ${APP_AUTH_JWT_ISSUER:personal-toolkit-backend}
      expiration: ${APP_AUTH_JWT_EXPIRATION:PT12H}
    captcha:
      enabled: ${APP_AUTH_CAPTCHA_ENABLED:true}
      adaptive: ${APP_AUTH_CAPTCHA_ADAPTIVE:false}
      adaptive-trigger-threshold: ${APP_AUTH_CAPTCHA_ADAPTIVE_TRIGGER_THRESHOLD:2}
      length: ${APP_AUTH_CAPTCHA_LENGTH:5}
      max-attempts: ${APP_AUTH_CAPTCHA_MAX_ATTEMPTS:3}
      ttl: ${APP_AUTH_CAPTCHA_TTL:PT2M}
      issue-threshold: ${APP_AUTH_CAPTCHA_ISSUE_THRESHOLD:20}
      issue-window: ${APP_AUTH_CAPTCHA_ISSUE_WINDOW:PT1M}
      login-fail-threshold: ${APP_AUTH_CAPTCHA_LOGIN_FAIL_THRESHOLD:5}
      login-fail-window: ${APP_AUTH_CAPTCHA_LOGIN_FAIL_WINDOW:PT15M}
