spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@192.168.240.128:1521:gdb}
    username: ${SPRING_DATASOURCE_USERNAME:gql}
    password: ${SPRING_DATASOURCE_PASSWORD:glaway123}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:192.168.240.128}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:glaway123}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:5s}

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.data.redis: info
